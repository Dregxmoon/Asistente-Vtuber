<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VTuber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }
  #live2d-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
<canvas id="live2d-canvas"></canvas>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const { ipcRenderer } = require('electron');
const path = require('path');
const fs   = require('fs');

window.PIXI = PIXI;

const MODEL_PATH = path.join(__dirname, '..', 'models', 'March 7th', 'march 7th.model3.json');
const canvas = document.getElementById('live2d-canvas');

let pixiApp, model;
let currentView = 'full';
let modelNaturalW = 0;
let modelNaturalH = 0;

// Estado de drag
let isDragging = false;

const VIEW = {
  full: { sr: 0.92, ax: 0.5, ay: 1.00, py: 1.00 },
  half: { sr: 1.70, ax: 0.5, ay: 0.72, py: 1.10 },
  head: { sr: 3.80, ax: 0.5, ay: 0.18, py: 0.90 },
};

async function loadModel() {
  if (!fs.existsSync(MODEL_PATH)) {
    console.error('Modelo no encontrado:', MODEL_PATH);
    return;
  }

  pixiApp = new PIXI.Application({
    view: canvas,
    width:  canvas.clientWidth,
    height: canvas.clientHeight,
    backgroundAlpha: 0,
    antialias: true,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  });

  PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);

  const fileUrl = 'file:///' + MODEL_PATH.replace(/\\/g, '/');
  console.log('Cargando:', fileUrl);

  try {
    model = await PIXI.live2d.Live2DModel.from(fileUrl);
    modelNaturalW = model.width;
    modelNaturalH = model.height;
    pixiApp.stage.addChild(model);
    applyView(currentView);
    setupInteraction();
    startIdle();
    console.log('Modelo OK:', modelNaturalW, 'x', modelNaturalH);
  } catch(err) {
    console.error('Error cargando modelo:', err);
  }
}

function applyView(view, animate = false) {
  if (!model || !pixiApp) return;

  const cfg = VIEW[view];
  const W = pixiApp.screen.width;
  const H = pixiApp.screen.height;
  const targetScale = (H / modelNaturalH) * cfg.sr;
  const targetX = W * cfg.ax;
  const targetY = H * cfg.py;

  if (!animate) {
    model.scale.set(targetScale);
    model.anchor.set(cfg.ax, cfg.ay);
    model.position.set(targetX, targetY);
    currentView = view;
    return;
  }

  const duration = 700;
  const start = performance.now();
  const fromScale = model.scale.x;
  const fromX = model.x;
  const fromY = model.y;
  const fromAX = model.anchor.x;
  const fromAY = model.anchor.y;
  const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

  const tick = (now) => {
    const t = Math.min((now - start) / duration, 1);
    const e = ease(t);
    model.scale.set(fromScale + (targetScale - fromScale) * e);
    model.anchor.set(
      fromAX + (cfg.ax - fromAX) * e,
      fromAY + (cfg.ay - fromAY) * e
    );
    model.position.set(
      fromX + (targetX - fromX) * e,
      fromY + (targetY - fromY) * e
    );
    if (t < 1) requestAnimationFrame(tick);
    else {
      currentView = view;
      triggerMotion();
    }
  };
  requestAnimationFrame(tick);
}

function triggerMotion() {
  try {
    const defs = model?.internalModel?.motionManager?.definitions;
    if (!defs) return;
    const groups = Object.keys(defs);
    if (!groups.length) return;
    model.motion(groups[Math.floor(Math.random() * groups.length)]);
  } catch(_) {}
}

function startIdle() {
  setTimeout(triggerMotion, 1000);
  setInterval(triggerMotion, 8000);
}

function setupInteraction() {
  // ── Hit detection + drag ──────────────────────────────────────────────────
  pixiApp.view.addEventListener('mousemove', (e) => {
    if (isDragging) {
      // Enviar posición absoluta del cursor en pantalla
      ipcRenderer.send('drag-move', {
        x: e.screenX,
        y: e.screenY,
      });
      return;
    }

    // Hit detection normal
    const rect = pixiApp.view.getBoundingClientRect();
    const lx = (e.clientX - rect.left)  / pixiApp.renderer.resolution;
    const ly = (e.clientY - rect.top)   / pixiApp.renderer.resolution;
    const b  = model.getBounds();
    const on = lx >= b.x && lx <= b.x + b.width &&
               ly >= b.y && ly <= b.y + b.height;
    ipcRenderer.send('model-hover', on);
  });

  pixiApp.view.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return; // solo clic izquierdo
    // Verificar si el cursor está sobre el modelo
    const rect = pixiApp.view.getBoundingClientRect();
    const lx = (e.clientX - rect.left)  / pixiApp.renderer.resolution;
    const ly = (e.clientY - rect.top)   / pixiApp.renderer.resolution;
    const b  = model.getBounds();
    const onModel = lx >= b.x && lx <= b.x + b.width &&
                    ly >= b.y && ly <= b.y + b.height;

    if (onModel) {
      isDragging = true;
      ipcRenderer.send('drag-start');
      // Durante el drag necesitamos recibir eventos aunque salga del canvas
      document.body.style.cursor = 'grabbing';
    }
  });

  // Terminar drag al soltar en cualquier parte
  window.addEventListener('mouseup', (e) => {
    if (e.button !== 0 || !isDragging) return;
    isDragging = false;
    document.body.style.cursor = '';
    ipcRenderer.send('model-hover', false);
  });

  pixiApp.view.addEventListener('mouseleave', () => {
    if (!isDragging) {
      ipcRenderer.send('model-hover', false);
    }
  });

  // Durante el drag, capturar movimiento aunque el mouse salga del canvas
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    ipcRenderer.send('drag-move', {
      x: e.screenX,
      y: e.screenY,
    });
  });
}

ipcRenderer.on('set-view', (e, view) => {
  if (!model) {
    currentView = view;
    return;
  }
  applyView(view, view !== currentView);
});

window.addEventListener('resize', () => {
  if (!pixiApp || !model) return;
  pixiApp.renderer.resize(canvas.clientWidth, canvas.clientHeight);
  applyView(currentView, false);
});

window.addEventListener('DOMContentLoaded', loadModel);
</script>
</body>
</html>
