<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VTuber Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    /* Canvas Live2D */
    #live2d-canvas {
      display: block;
      width: 100%;
      height: calc(100% - 40px);
    }

    /* Barra de control superior */
    #control-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      background: rgba(15, 10, 30, 0.75);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(180, 120, 255, 0.3);
      border-radius: 8px 8px 0 0;
      cursor: grab;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 100;
    }

    #app:hover #control-bar { opacity: 1; }
    #control-bar:active { cursor: grabbing; }

    .ctrl-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: rgba(200, 170, 255, 0.8);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .ctrl-buttons {
      display: flex;
      gap: 6px;
    }

    .ctrl-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
    }
    .ctrl-btn:hover { transform: scale(1.15); opacity: 0.9; }

    #btn-clickthrough {
      background: rgba(100, 80, 180, 0.7);
      color: #ccc;
      border: 1px solid rgba(150, 120, 255, 0.4);
    }
    #btn-clickthrough.active {
      background: rgba(180, 100, 255, 0.8);
      color: #fff;
    }

    #btn-close {
      background: rgba(200, 60, 80, 0.7);
      color: #fff;
      border: 1px solid rgba(255, 100, 120, 0.4);
    }

    /* Estado de carga */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: rgba(12, 8, 25, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
      border-radius: 8px;
    }

    .loading-orb {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #7c3aed, #ec4899, #7c3aed);
      animation: spin 1.2s linear infinite;
      filter: drop-shadow(0 0 12px rgba(180,100,255,0.7));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      color: rgba(200, 170, 255, 0.9);
      letter-spacing: 1px;
    }

    /* Dropzone para modelo */
    #drop-zone {
      position: absolute;
      inset: 40px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed rgba(150, 100, 255, 0.4);
      margin: 8px;
      border-radius: 12px;
      background: rgba(20, 12, 40, 0.6);
      z-index: 50;
      transition: all 0.3s;
    }
    #drop-zone.drag-over {
      border-color: rgba(200, 130, 255, 0.9);
      background: rgba(100, 60, 200, 0.15);
    }
    #drop-zone.hidden { display: none; }

    .drop-icon { font-size: 48px; }
    .drop-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: rgba(220, 190, 255, 0.9);
    }
    .drop-sub {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: rgba(160, 130, 210, 0.7);
      text-align: center;
      line-height: 1.6;
    }

    .btn-browse {
      margin-top: 8px;
      padding: 8px 20px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.8), rgba(236, 72, 153, 0.8));
      border: 1px solid rgba(200, 130, 255, 0.4);
      border-radius: 20px;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-browse:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(150, 80, 255, 0.4);
    }

    /* Status badge */
    #status-badge {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      padding: 3px 12px;
      border-radius: 20px;
      background: rgba(20, 12, 40, 0.8);
      border: 1px solid rgba(150, 100, 255, 0.3);
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      color: rgba(180, 150, 255, 0.8);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    #status-badge.show { opacity: 1; }
  </style>
</head>
<body>

<div id="app">
  <!-- Barra de control -->
  <div id="control-bar" id="drag-handle">
    <span class="ctrl-title">✦ VTuber</span>
    <div class="ctrl-buttons">
      <button class="ctrl-btn" id="btn-clickthrough" title="Activar Click-Through">🖱️</button>
      <button class="ctrl-btn" id="btn-close" title="Cerrar">✕</button>
    </div>
  </div>

  <!-- Canvas Live2D -->
  <canvas id="live2d-canvas"></canvas>

  <!-- Drop Zone (visible cuando no hay modelo) -->
  <div id="drop-zone">
    <div class="drop-icon">🎭</div>
    <div class="drop-title">Arrastra tu modelo Live2D</div>
    <div class="drop-sub">
      Suelta el archivo <strong style="color:#c084fc">.model3.json</strong> aquí<br>
      o haz clic para buscar
    </div>
    <button class="btn-browse" id="btn-browse">📂 Buscar modelo</button>
    <div class="drop-sub" style="margin-top:4px;font-size:10px;opacity:0.6">
      También puedes cargar un modelo de prueba gratuito de internet
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-screen" style="display:none">
    <div class="loading-orb"></div>
    <div class="loading-text">Cargando modelo...</div>
  </div>

  <!-- Status -->
  <div id="status-badge"></div>
</div>

<!-- 1. Cubism Core (DEBE ir primero) -->
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<!-- 2. PIXI.js v6 (más compatible con pixi-live2d-display) -->
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<!-- 3. pixi-live2d-display -->
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const { ipcRenderer } = require('electron');
const path = require('path');
const fs = require('fs');

// Exponer PIXI globalmente para pixi-live2d-display
window.PIXI = PIXI;

// ── Elementos ──────────────────────────────────────────────────────────────
const canvas       = document.getElementById('live2d-canvas');
const dropZone     = document.getElementById('drop-zone');
const loadingScreen= document.getElementById('loading-screen');
const statusBadge  = document.getElementById('status-badge');
const btnClose     = document.getElementById('btn-close');
const btnCT        = document.getElementById('btn-clickthrough');
const btnBrowse    = document.getElementById('btn-browse');
const controlBar   = document.getElementById('control-bar');

let pixiApp = null;
let currentModel = null;
let isDraggingWindow = false;
let dragStart = { x: 0, y: 0 };

// ── Status helper ──────────────────────────────────────────────────────────
function showStatus(msg, duration = 2500) {
  statusBadge.textContent = msg;
  statusBadge.classList.add('show');
  setTimeout(() => statusBadge.classList.remove('show'), duration);
}

// ── Inicializar PIXI ───────────────────────────────────────────────────────
function initPixi() {
  if (pixiApp) { pixiApp.destroy(true); pixiApp = null; }

  pixiApp = new PIXI.Application({
    view: canvas,
    width: canvas.parentElement.clientWidth,
    height: canvas.parentElement.clientHeight - 40,
    backgroundAlpha: 0,
    antialias: true,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  });
}

// ── Cargar modelo Live2D ───────────────────────────────────────────────────
async function loadModel(modelPath) {
  dropZone.classList.add('hidden');
  loadingScreen.style.display = 'flex';

  try {
    initPixi();

    // Registrar ticker de PIXI en Live2DModel
    PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);

    // Convertir ruta local a URL tipo file://
    const fileUrl = 'file:///' + modelPath.replace(/\\/g, '/');
    console.log('Cargando modelo desde:', fileUrl);

    const model = await PIXI.live2d.Live2DModel.from(fileUrl);

    // Escalar y posicionar centrado
    const scaleX = pixiApp.screen.width  / model.width;
    const scaleY = pixiApp.screen.height / model.height;
    const scale  = Math.min(scaleX, scaleY) * 0.92;

    model.scale.set(scale);
    model.anchor.set(0.5, 1);
    model.position.set(pixiApp.screen.width / 2, pixiApp.screen.height);

    // Interacción: el modelo mira al cursor
    model.interactive = true;

    if (currentModel) pixiApp.stage.removeChild(currentModel);
    pixiApp.stage.addChild(model);
    currentModel = model;

    // Animación idle aleatoria cada N segundos
    startIdleLoop(model);

    loadingScreen.style.display = 'none';
    showStatus('✦ Modelo cargado');
  } catch (err) {
    loadingScreen.style.display = 'none';
    dropZone.classList.remove('hidden');
    showStatus('⚠ Error al cargar modelo', 4000);
    console.error(err);
  }
}

// ── Idle loop ──────────────────────────────────────────────────────────────
function startIdleLoop(model) {
  setInterval(() => {
    try {
      const motions = model.internalModel?.motionManager?.definitions;
      if (motions) {
        const groups = Object.keys(motions);
        if (groups.length > 0) {
          const group = groups[Math.floor(Math.random() * groups.length)];
          model.motion(group);
        }
      }
    } catch(_) {}
  }, 8000);
}

// ── Drag de ventana desde la barra ────────────────────────────────────────
controlBar.addEventListener('mousedown', (e) => {
  if (e.target.classList.contains('ctrl-btn')) return;
  isDraggingWindow = true;
  dragStart = { x: e.screenX, y: e.screenY };
});

document.addEventListener('mousemove', (e) => {
  if (!isDraggingWindow) return;
  const deltaX = e.screenX - dragStart.x;
  const deltaY = e.screenY - dragStart.y;
  dragStart = { x: e.screenX, y: e.screenY };
  ipcRenderer.send('drag-window', { deltaX, deltaY });
});

document.addEventListener('mouseup', () => { isDraggingWindow = false; });

// ── Botones control ────────────────────────────────────────────────────────
btnClose.addEventListener('click', () => ipcRenderer.send('close-app'));

btnCT.addEventListener('click', () => {
  ipcRenderer.send('toggle-clickthrough');
});

ipcRenderer.on('clickthrough-status', (e, active) => {
  btnCT.classList.toggle('active', active);
  showStatus(active ? '🖱️ Click-through ON' : '🖱️ Click-through OFF');
});

// ── Browse file (usando input oculto) ─────────────────────────────────────
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = '.json';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);

btnBrowse.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (file && file.name.endsWith('.model3.json')) {
    loadModel(file.path);
  } else {
    showStatus('⚠ Selecciona un .model3.json', 3000);
  }
  fileInput.value = '';
});

// ── Drag & Drop de archivos ────────────────────────────────────────────────
document.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
document.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.model3.json')) {
    loadModel(file.path);
  } else {
    showStatus('⚠ Solo archivos .model3.json', 3000);
  }
});

// ── Resize responsivo ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!pixiApp || !currentModel) return;
  pixiApp.renderer.resize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight - 40);
  const scaleX = pixiApp.screen.width  / (currentModel.width  / currentModel.scale.x);
  const scaleY = pixiApp.screen.height / (currentModel.height / currentModel.scale.y);
  const scale  = Math.min(scaleX, scaleY) * 0.92;
  currentModel.scale.set(scale);
  currentModel.position.set(pixiApp.screen.width / 2, pixiApp.screen.height);
});
</script>
</body>
</html>
