<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VTuber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }
  #live2d-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>

<canvas id="live2d-canvas"></canvas>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const { ipcRenderer } = require('electron');
const path = require('path');
const fs   = require('fs');

window.PIXI = PIXI;

const MODEL_PATH = path.join(__dirname, '..', 'models', 'March 7th', 'march 7th.model3.json');
const canvas = document.getElementById('live2d-canvas');

let pixiApp, model;

async function loadModel() {
  if (!fs.existsSync(MODEL_PATH)) {
    console.error('Modelo no encontrado en:', MODEL_PATH);
    return;
  }

  pixiApp = new PIXI.Application({
    view: canvas,
    resizeTo: window,
    backgroundAlpha: 0,
    antialias: true,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  });

  PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);

  const fileUrl = 'file:///' + MODEL_PATH.replace(/\\/g, '/');
  console.log('Cargando:', fileUrl);

  try {
    model = await PIXI.live2d.Live2DModel.from(fileUrl);
    pixiApp.stage.addChild(model);
    fitModel();
    setupHitDetection();
    startIdle();
    console.log('Modelo cargado OK');
  } catch(err) {
    console.error('Error cargando modelo:', err);
  }
}

function fitModel() {
  if (!model) return;

  // Escalar para que llene bien la ventana verticalmente
  const scale = (pixiApp.screen.height / model.height) * 0.95;
  model.scale.set(scale);

  // Anclar en base (centro horizontal, pie abajo)
  model.anchor.set(0.5, 1);

  // Posicionar en esquina inferior derecha dentro del canvas
  model.position.set(
    pixiApp.screen.width  * 0.62, // desplazado a la derecha
    pixiApp.screen.height          // pegado al fondo
  );
}

// ── Hit detection: el overlay pasa clics salvo cuando el cursor está sobre el modelo
function setupHitDetection() {
  if (!model) return;

  // El canvas del PIXI detecta movimiento del mouse
  pixiApp.view.addEventListener('mousemove', (e) => {
    const rect   = pixiApp.view.getBoundingClientRect();
    const localX = (e.clientX - rect.left)  / pixiApp.renderer.resolution;
    const localY = (e.clientY - rect.top)   / pixiApp.renderer.resolution;

    // Calcular bounding box del modelo en coordenadas del canvas
    const bounds = model.getBounds();
    const onModel = (
      localX >= bounds.x &&
      localX <= bounds.x + bounds.width &&
      localY >= bounds.y &&
      localY <= bounds.y + bounds.height
    );

    ipcRenderer.send('model-hover', onModel);
  });

  pixiApp.view.addEventListener('mouseleave', () => {
    ipcRenderer.send('model-hover', false);
  });
}

function startIdle() {
  setInterval(() => {
    try {
      const motions = model?.internalModel?.motionManager?.definitions;
      if (!motions) return;
      const groups = Object.keys(motions);
      if (!groups.length) return;
      model.motion(groups[Math.floor(Math.random() * groups.length)]);
    } catch(_) {}
  }, 8000);
}

window.addEventListener('resize', fitModel);
window.addEventListener('DOMContentLoaded', loadModel);
</script>
</body>
</html>
